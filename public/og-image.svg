<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>

  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.5"/>

  <!-- Accent glow -->
  <ellipse cx="600" cy="315" rx="400" ry="200" fill="#34d399" opacity="0.05"/>

  <!-- Logo icon -->
  <g transform="translate(540, 180)">
    <rect width="120" height="120" rx="24" fill="#0f0f0f" stroke="#34d399" stroke-width="2" opacity="0.8"/>
    <path d="M30 40h20v50H30z" fill="#34d399"/>
    <path d="M55 55h20v35H55z" fill="#34d399" opacity="0.7"/>
    <path d="M80 35h20v60H80z" fill="#34d399" opacity="0.5"/>
    <circle cx="95" cy="35" r="6" fill="#34d399"/>
  </g>

  <!-- Title -->
  <text x="600" y="360" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="white">
    CDR<tspan fill="#34d399">Check</tspan>
  </text>

  <!-- Subtitle -->
  <text x="600" y="420" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#888888">
    CDR Reconciliation for VoIP Carriers
  </text>

  <!-- Features -->
  <text x="600" y="500" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#666666">
    Compare Records  •  Find Discrepancies  •  Free Tool
  </text>
</svg>
